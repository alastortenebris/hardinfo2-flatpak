id: org.hardinfo2.hardinfo2
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: hardinfo2
finish-args:
  - --share=ipc
  - --socket=x11
  - --filesystem=host
  - --share=network
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro
  - --talk-name=ca.desrt.dconf
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf
  - --device=dri
  - --talk-name=org.freedesktop.Flatpak
  - '--system-talk-name=org.freedesktop.UDisks2'
  - '--system-talk-name=org.freedesktop.fwupd'
modules:
   - name: qt5-qtbase
     buildsystem: simple
     build-commands:
      - ./configure -prefix /app -nomake tests -confirm-license -optimize-size -shared -no-dbus -no-rpath -nomake examples -openssl-linked -system-sqlite -no-mimetype-database -system-harfbuzz -optimized-qmake
      - make CFLAGS="${CFLAGS}" LDFLAGS="${LDFLAGS}"
      - make install        
     sources:
      - type: git
        url: 'https://invent.kde.org/qt/qt/qtbase.git'
        tag: v5.15.18-lts-lgpl
   - name: kmod
     buildsystem: meson
     config-opts:
      - -Dbuild-tests=false
      - -Dmanpages=false
      - -Dopenssl=disabled
      - -Dxz=disabled
      - -Dzlib=disabled
      - -Dzstd=disabled
      - -Dbashcompletiondir=no
      - --sbindir=/app/bin
     sources:
      - type: git
        url: 'https://git.kernel.org/pub/scm/utils/kernel/kmod/kmod.git'
        tag: v34.2
   - name: vulkan-headers
     buildsystem: cmake-ninja
     sources:
      - type: archive
        url: https://github.com/KhronosGroup/Vulkan-Headers/archive/v1.4.347/Vulkan-Headers-v1.4.347.tar.gz
        sha256: 6611f09ed95aaf2c47ad76df9fb3e5455ce52d1ed3d0ef5dbc0d63e3208d3faa
   - name: vulkan-tools
     buildsystem: cmake-ninja
     config-opts:
      - -DGLSLANG_INSTALL_DIR=/app
      - -DVULKAN_HEADERS_INSTALL_DIR=/app
      - -DCMAKE_BUILD_TYPE=Release
     sources:
      - type: archive
        url: https://github.com/KhronosGroup/Vulkan-Tools/archive/v1.4.347/Vulkan-Tools-1.4.347.tar.gz
        sha256: 4ed73bd973069633ef2b830c7b9f3ebcb7bc8aaac5783b9e5aa36c888e687a78
   - name: xrandr
     buildsystem: simple
     sources:
      - type: archive
        url: https://www.x.org/archive/individual/app/xrandr-1.5.4.tar.xz
        sha256: 2cafccb2aaf2491a4068676117a0d4f90ab307724b96fffc54cd1da953779400
     build-commands:
      - ./configure --prefix=/app
      - make prefix=/app CFLAGS="${CFLAGS}" LDFLAGS="${LDFLAGS}"
      - make prefix=/app install
        
   - name: libglu
     buildsystem: meson
     sources:
      - type: git
        url: 'https://gitlab.freedesktop.org/mesa/glu.git'
        tag: glu-9.0.3
   - name: mesa-utils
     buildsystem: meson
     sources:
      - type: archive
        url: https://archive.mesa3d.org/demos/mesa-demos-9.0.0.tar.xz
        sha256: 3046a3d26a7b051af7ebdd257a5f23bfeb160cad6ed952329cdff1e9f1ed496b
     cleanup:
      - /share/mesa-demos
   - name: dmidecode
     buildsystem: simple
     sources:
        - type: archive
          url: https://download.savannah.gnu.org/releases/dmidecode/dmidecode-3.7.tar.xz
          sha256: 2c3aed12c85a1e6a9410d406d5e417c455466dc1bc7c89278bb32cf7cad91e8a
     build-commands:
      - sed -i "s:sbin:bin:g" Makefile
      - make prefix=/app CFLAGS="${CFLAGS}" LDFLAGS="${LDFLAGS}"
      - make prefix=/app install-bin
   - name: hardinfo2
     buildsystem: cmake
     config-opts:
       - '-DCMAKE_BUILD_TYPE=Release'
       - '-DCMAKE_INSTALL_PREFIX=/app'
       - '-DCMAKE_INSTALL_BINDIR=/app/bin'
       - '-DCMAKE_INSTALL_DATAROOTDIR=/app/share'
       - '-DCMAKE_INSTALL_LIBDIR=/app/lib'
       - '-DCMAKE_RUNTIME_OUTPUT_DIRECTORY=bin'
       - '-DHARDINFO2_SERVICE=0'
     sources:
      - type: git
        url: 'https://github.com/hardinfo2/hardinfo2.git'
        tag: release-2.2.16
        commit: 8ea355f68bbf6d9de8da091341d90a9efd3a7f0c
        x-checker-data:
          type: git
          tag-pattern: '^v([\d.]+)$'
      - type: patch
        path: fix-benchmark-install.patch
